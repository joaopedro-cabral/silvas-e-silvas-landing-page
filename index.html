<!DOCTYPE html>
<html lang="pt-BR" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Silvas e Silvas | Materiais de Construção</title>
    <meta name="description" content="Materiais elétricos, hidráulicos e ferramentas em Santo Amaro." />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          brand: {
            green: '#87D44B',
            black: '#1A1A1A',
            navy: '#064e3b'
          }
        }
      }
    }
  }
    </script>
    <style>
      /* TOKENS DE CORES - TEMA VERDE PREMIUM */
      :root {
        --green-900: #06074e;
        --green-800: #06135f;
        --green-700: #044478;
        --text-pure: #ffffff;
        --text-soft: #ecfdf5;
        --text-muted: #a7dbf3;
        --brand-green: #87D44B;
        --brand-black: #1A1A1A;
      }

      body {
        /* BACKGROUND MULTI-CAMADA (CSS ONLY) */
        background-color: var(--green-900);
        background-image: 
          /* CAMADA 1: PONTINHOS (DOT PATTERN) */
          radial-gradient(circle at 1px 1px, rgba(255, 255, 255, 0.08) 1px, transparent 0),
          /* CAMADA 2: GRID TÉCNICO / BLUEPRINT (LINHAS TÊNUES) */
          linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
          /* CAMADA 3: GRADIENTE DE PROFUNDIDADE */
          linear-gradient(135deg, var(--green-900) 0%, var(--green-800) 50%, var(--green-700) 100%);
        
        /* Ajuste de escala das texturas */
        background-size: 24px 24px, 80px 80px, 80px 80px, 100% 100%;
        color: var(--text-soft);
        font-family: 'Inter', sans-serif;
        margin: 0;
        min-height: 100vh;
      }

      /* REMOÇÃO DE IMAGENS DE FUNDO EXISTENTES NOS COMPONENTES */
      section div[class*="-z-"] img, 
      section div[class*="-z-10"] img,
      section div[class*="-z-20"] img {
        display: none !important;
      }
      
      section div[class*="bg-brand-gray"],
      section div[class*="bg-brand-navy"],
      section div[class*="bg-gradient-to-b"] {
        background: transparent !important;
      }

      /* AJUSTES DE TIPOGRAFIA E CONTRASTE */
      h1, h5, h6 {
        color: var(--text-pure) !important;
        text-shadow: 0 2px 4px rgba(0,0,0,0.2);
      }

      .text-gray-400, .text-gray-500, .text-gray-700, .text-gray-800 {
        color: var(--text-muted) !important;
      }

      /* PRESERVAÇÃO DOS DESTAQUES VERDE/PRETO */
      .brush-highlight {
        position: relative;
        display: inline-block;
        z-index: 1;
      }
      
      .brush-highlight::before {
        content: "";
        position: absolute;
        top: 20%;
        left: -4px;
        right: -4px;
        bottom: 5%;
        background-color: var(--brand-green) !important;
        z-index: -1;
        clip-path: polygon(0% 5%, 100% 0%, 98% 90%, 2% 100%);
        opacity: 1;
      }

      .bg-brand-black {
        background-color: var(--brand-black) !important;
      }

      .text-brand-green {
        color: var(--brand-green) !important;
      }

      /* COMPONENTES ESPECÍFICOS */
      .industrial-border {
        border: 4px solid var(--brand-black);
        box-shadow: 8px 8px 0px 0px var(--brand-black);
      }

      /* Scrollbar Industrial VERDE */
      ::-webkit-scrollbar { width: 12px; }
      ::-webkit-scrollbar-track { background: var(--green-900); }
      ::-webkit-scrollbar-thumb { background: var(--brand-green); border: 3px solid var(--green-900); }

      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "react/": "https://esm.sh/react@^19.2.4/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
